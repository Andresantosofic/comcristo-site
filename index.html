<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ComCristo | Devocional Diário, Bíblia e Versículos</title>

<meta name="description" content="ComCristo é um aplicativo cristão com devocional diário, versículos e Bíblia organizada para fortalecer sua caminhada com Deus.">

<meta property="og:title" content="ComCristo - Devocional Diário">
<meta property="og:description" content="Fortaleça sua fé todos os dias com versículos, devocionais e Bíblia organizada.">
<meta property="og:image" content="mockup.png">
<meta property="og:type" content="website">

<link rel="icon" type="image/png" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Poppins',sans-serif;
background:#f5f7fa;
color:#1a1a1a;
overflow-x:hidden;
}

section{padding:70px 20px;}
.container{max-width:1100px;margin:auto;}
h1,h2{font-weight:800;letter-spacing:-0.5px;}
p{line-height:1.7;}

/* TOPO */
.topbar{
background:white;
padding:6px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}
.topbar img{height:58px;}

/* HERO */
.hero{
background:linear-gradient(135deg,#0f2f63,#1e5db8);
color:white;
text-align:center;
position:relative;
overflow:hidden;
}
.hero h1{
font-size:34px;
margin-bottom:20px;
animation:fadeUp 1s ease forwards;
}
.hero p{
max-width:600px;
margin:auto;
opacity:0.95;
animation:fadeUp 1.4s ease forwards;
}

.btn-primary{
margin-top:30px;
background:white;
color:#1e5db8;
padding:16px 38px;
border-radius:50px;
font-weight:700;
display:inline-block;
transition:all .3s ease;
animation:fadeUp 1.8s ease forwards;
text-decoration:none;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}
.btn-primary:hover{
transform:translateY(-3px);
box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

.hero small{display:block;margin-top:15px;opacity:.85;}

/* MOCKUP */
.mockup{position:relative;text-align:center;margin-top:60px;}
.mockup img{
width:320px;
max-width:100%;
animation:floatAdvanced 5s ease-in-out infinite;
filter:drop-shadow(0 25px 35px rgba(0,0,0,.35));
position:relative;
z-index:1;
}

/* CARDS FLUTUANTES */
.floating-card{
position:absolute;
background:white;
color:#1e5db8;
padding:8px 18px;
border-radius:40px;
font-weight:600;
font-size:14px;
box-shadow:0 15px 30px rgba(0,0,0,.25);
white-space:nowrap;
z-index:2;
animation:floatCard 4s ease-in-out infinite;
}
.card-top-left{top:5%;left:8%;}
.card-bottom-right{bottom:8%;right:5%;}

/* FEATURES */
.features{text-align:center;background:#f8fafc;}
.features h2{margin-bottom:40px;color:#0f2f63;}

.card{
background:linear-gradient(135deg,#0f2f63,#1e5db8);
color:white;
padding:35px;
border-radius:25px;
margin-bottom:25px;
transition:.4s;
opacity:0;
transform:translateY(40px);
box-shadow:0 15px 35px rgba(0,0,0,.1);
}
.card.show{opacity:1;transform:translateY(0);}
.card:hover{transform:translateY(-5px);}
.card h3{margin-bottom:10px;}

/* BENEFÍCIOS */
.benefits{text-align:center;padding-top:30px;margin-top:-20px;}
.benefit-box{
background:white;
padding:30px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 15px 35px rgba(0,0,0,.08);
opacity:0;
transform:translateY(40px);
transition:.6s;
}
.benefit-box.show{opacity:1;transform:translateY(0);}

/* SOBRE */
.about-section{background:#ffffff;}
.card-white{
background:white;
padding:35px;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,.08);
margin-bottom:25px;
opacity:0;
transform:translateY(40px);
transition:.6s;
}
.card-white.show{opacity:1;transform:translateY(0);}

/* SUPPORT */
.support-box{
background:linear-gradient(135deg,#0c254f,#1e5db8);
color:white;
padding:50px;
border-radius:35px;
margin-top:40px;
box-shadow:0 35px 80px rgba(0,0,0,.35);
opacity:0;
transform:translateY(40px);
transition:.6s;
}
.support-box.show{opacity:1;transform:translateY(0);}

.pix-highlight{
background:rgba(255,255,255,.15);
padding:18px;
border-radius:18px;
margin:25px 0;
font-weight:600;
text-align:center;
}

/* BOTÃO PADRÃO */
.btn{
display:inline-block;
margin-top:20px;
padding:14px 30px;
background:white;
color:#1e5db8;
border-radius:40px;
font-weight:700;
text-decoration:none;
transition:.3s;
margin-right:10px;
border:none;
cursor:pointer;
}
.btn:hover{transform:scale(1.05);}

/* CONTADOR */
.counter-box{
margin-top:35px;
background:rgba(255,255,255,.12);
padding:25px;
border-radius:20px;
text-align:center;
}
.counter-value{
font-size:26px;
font-weight:800;
margin-bottom:15px;
}

/* REDES */
.social-box{
background:white;
padding:35px;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,.08);
margin-top:30px;
opacity:0;
transform:translateY(40px);
transition:.6s;
}
.social-box.show{opacity:1;transform:translateY(0);}
.social-links a{
display:block;
margin-top:10px;
font-weight:600;
color:#1e5db8;
text-decoration:none;
}

/* CTA */
.cta{
background:linear-gradient(135deg,#0f2f63,#1e5db8);
color:white;
text-align:center;
}
.cta h2{font-size:32px;margin-bottom:20px;}

/* FOOTER */
footer{
background:#0f2f63;
color:white;
text-align:center;
padding:30px 20px;
font-size:14px;
}

/* ANIMAÇÕES */
@keyframes fadeUp{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}
@keyframes floatAdvanced{
0%{transform:translateY(0px) rotate(-6deg);}
50%{transform:translateY(-18px) rotate(-4deg);}
100%{transform:translateY(0px) rotate(-6deg);}
}
@keyframes floatCard{
0%{transform:translateY(0px);}
50%{transform:translateY(-8px);}
100%{transform:translateY(0px);}
}
</style>
</head>

<body>

<div class="topbar">
<img src="logo.png" alt="ComCristo Logo">
</div>

<section class="hero">
<div class="container">
<h1>Viva a Palavra todos os dias</h1>
<p>O ComCristo foi criado para ajudar você a criar constância espiritual com leveza, profundidade e propósito.</p>
<a class="btn-primary">Lançamento em breve</a>
<small>Disponível apenas para Android no momento</small>

<div class="mockup">
<div class="floating-card card-top-left">Devocional Completo</div>
<img src="mockup.png" alt="App ComCristo">
<div class="floating-card card-bottom-right">Poderosa Palavra de Deus</div>
</div>
</div>
</section>

<script>
const elements=document.querySelectorAll('.card,.benefit-box,.card-white,.support-box,.social-box');

function showOnScroll(){
const trigger=window.innerHeight*0.85;
elements.forEach(el=>{
const top=el.getBoundingClientRect().top;
if(top<trigger){el.classList.add('show');}
});
}
window.addEventListener('scroll',showOnScroll);
showOnScroll();

function copiarPix(){
navigator.clipboard.writeText("comcristoapp@gmail.com");
alert("Chave Pix copiada!");
}
</script>

</body>
</html>
