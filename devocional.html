<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Devocional | ComCristo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Poppins',sans-serif;
background:#e9eef3;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
}

.card{
background:white;
border-radius:25px;
padding:25px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.card-dark{
background:#2a466b;
color:white;
}

.titulo-pequeno{
font-size:12px;
opacity:0.7;
margin-bottom:10px;
text-transform:uppercase;
font-weight:600;
}

.titulo{
font-size:20px;
font-weight:800;
margin-bottom:10px;
}

.texto{
font-size:15px;
line-height:1.6;
}

.botoes{
margin-top:25px;
display:flex;
flex-direction:column;
gap:12px;
}

.btn{
padding:16px;
border-radius:40px;
border:none;
font-weight:700;
cursor:pointer;
font-family:'Poppins',sans-serif;
font-size:14px;
}

.btn-primary{
background:#2bb3b1;
color:white;
}

.btn-sec{
background:white;
border:2px solid #2bb3b1;
color:#2bb3b1;
}

.concluido{
background:#4CAF50 !important;
color:white;
}
</style>
</head>

<body>

<div class="container">

<!-- 1° CARD -->
<div class="card">
<div class="titulo-pequeno">Tema do devocional</div>
<div id="tema" class="titulo">Carregando...</div>

<p id="versiculo" class="texto"></p>

<p id="referencia" class="texto" style="margin-top:10px;opacity:0.7;"></p>
</div>

<!-- 2° CARD -->
<div class="card card-dark">
<div class="titulo">📖 Estudo</div>
<p id="estudo" class="texto"></p>
</div>

<!-- 3° CARD -->
<div class="card card-dark">
<div class="titulo">🤔 Reflexão</div>
<p id="reflexao" class="texto"></p>
</div>

<!-- 4° CARD -->
<div class="card card-dark">
<div class="titulo">🛠 Aplicação Prática</div>
<p id="aplicacao" class="texto"></p>
</div>

<!-- 5° CARD -->
<div class="card card-dark">
<div class="titulo">🙏 Oração</div>
<p id="oracao" class="texto"></p>
</div>

<!-- BOTÕES -->
<div class="botoes">

<button id="btnConcluir" class="btn btn-primary">
Concluir devocional de hoje
</button>

<button id="btnCompartilhar" class="btn btn-sec">
Compartilhar
</button>

</div>

</div>

<script>

// 🔥 CARREGAR DEVOCIONAL
async function carregarDevocional(){

try{

const resposta = await fetch("https://andresantosofic.github.io/comcristo-site/devocionais.json");
const dados = await resposta.json();

let devocionais = dados;

if(dados.data && dados.data.devocionais){
devocionais = dados.data.devocionais;
}

// ✅ DATA CORRETA (BRASIL)
const hoje = new Date().toLocaleDateString("en-CA");

let dataEscolhida = devocionais[hoje];

if(!dataEscolhida){
const datas = Object.keys(devocionais).sort();
const ultima = datas[datas.length - 1];
dataEscolhida = devocionais[ultima];
}

const dev = dataEscolhida.devocional;

// 🔥 PREENCHER HTML
document.getElementById("tema").innerText = dev.tema;
document.getElementById("versiculo").innerText = `"${dev.versiculo}"`;
document.getElementById("referencia").innerText = dev.referencia;
document.getElementById("estudo").innerText = dev.estudo;
document.getElementById("reflexao").innerText = dev.reflexao;
document.getElementById("aplicacao").innerText = dev.aplicacao;
document.getElementById("oracao").innerText = dev.oracao;

}catch(e){
console.error("Erro ao carregar devocional:", e);
}

}

// 🔥 CONCLUIR DEVOCIONAL
const hoje = new Date().toLocaleDateString("en-CA");
const chave = "devocional_" + hoje;

const btnConcluir = document.getElementById("btnConcluir");

if(localStorage.getItem(chave)){
btnConcluir.innerText = "✔ Devocional concluído";
btnConcluir.classList.add("concluido");
}

btnConcluir.addEventListener("click", () => {
localStorage.setItem(chave, "true");
btnConcluir.innerText = "✔ Devocional concluído";
btnConcluir.classList.add("concluido");
});

// 🔥 COMPARTILHAR
document.getElementById("btnCompartilhar").addEventListener("click", () => {

const link = window.location.href;

const titulo = document.getElementById("tema").innerText;
const referencia = document.getElementById("referencia").innerText;

const texto = 
`📖 Devocional do dia

${titulo} — ${referencia}

✨ Separe alguns minutos com Deus hoje.

👉 Leia completo:
${link}`;

if(navigator.share){
navigator.share({
title: "Devocional do dia",
text: texto
});
}else{
window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`, '_blank');
}

});

// 🔥 INIT
document.addEventListener("DOMContentLoaded", carregarDevocional);

</script>

</body>
</html>
